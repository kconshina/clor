<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Словарь IT-профессионала</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #eef2f7 0%, #d4dfe9 100%);
            font-family: 'Segoe UI', Roboto, sans-serif;
            padding: 2rem 1rem;
            color: #1a2a3a;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .hero {
            text-align: center;
            padding: 1.5rem 1rem;
            background: rgba(8, 28, 45, 0.9);
            border-radius: 56px;
            margin-bottom: 2rem;
        }
        .hero h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #fff, #bee0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero p { color: #eef4ff; margin-top: 0.5rem; }
        .badge-group {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }
        .badge {
            background: #1e4a76;
            color: white;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .stats {
            display: flex;
            justify-content: center;
            gap: 1.8rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .stat-card {
            background: white;
            border-radius: 60px;
            padding: 0.5rem 1.5rem;
            box-shadow: 0 8px 18px rgba(0,0,0,0.05);
            font-weight: 600;
            border: 1px solid #ccddee;
        }
        .stat-number {
            color: #0f4c6b;
            font-size: 1.6rem;
            font-weight: 800;
            margin-right: 6px;
        }
        .tabs {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: #ecf3f8;
            border: none;
            padding: 0.8rem 2rem;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 48px;
            cursor: pointer;
            transition: 0.2s;
            color: #1f5068;
            font-family: inherit;
        }
        .tab-btn.active {
            background: #1f6e93;
            color: white;
        }
        .tab-btn:last-child.active { background: #b4430c; }
        .search-box {
            max-width: 500px;
            margin: 0 auto 2rem auto;
        }
        .search-box input {
            width: 100%;
            padding: 0.85rem 1.2rem;
            font-size: 1rem;
            border: none;
            border-radius: 60px;
            background: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            outline: none;
        }
        .dictionary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
            gap: 1.5rem;
        }
        .term-card {
            background: rgba(255,255,255,0.94);
            border-radius: 28px;
            padding: 1.2rem 1.4rem;
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 12px 22px -12px rgba(0,0,0,0.1);
            transition: 0.2s;
        }
        .term-card:hover {
            transform: translateY(-3px);
            background: white;
        }
        .term-title {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(120deg, #0b3b4f, #1c6e8f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            border-left: 4px solid #2c7da0;
            padding-left: 14px;
        }
        .term-desc {
            font-size: 0.94rem;
            line-height: 1.45;
            color: #2c3e44;
            margin-top: 6px;
        }
        .slang-tag {
            display: inline-block;
            background: #ffefe5;
            color: #c25d2e;
            font-size: 0.7rem;
            font-weight: 700;
            border-radius: 30px;
            padding: 0.2rem 0.7rem;
            margin-left: 12px;
            -webkit-text-fill-color: #c25d2e;
        }
        .no-results {
            text-align: center;
            grid-column: 1 / -1;
            padding: 3rem;
            background: white;
            border-radius: 48px;
            font-size: 1.1rem;
            color: #4a6272;
        }
        footer {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.85rem;
            color: #2c5a6e;
            padding: 1rem;
            border-top: 1px solid rgba(0,0,0,0.08);
        }
        @media (max-width: 680px) {
            .term-title { font-size: 1.2rem; }
            .tab-btn { padding: 0.5rem 1.2rem; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>📖 Словарь: Компьютерные системы и комплексы</h1>
        <p>96 терминов: обычная лексика и IT-жаргон</p>
        <div class="badge-group">
            <div class="badge">💻 Аппаратные средства</div>
            <div class="badge">🖧 Сетевые технологии</div>
            <div class="badge">⚙️ Системная архитектура</div>
        </div>
    </div>

    <div class="stats">
        <div class="stat-card"><span class="stat-number" id="totalCount">0</span> всего</div>
        <div class="stat-card"><span class="stat-number" id="normalCount">0</span> 📘 обычных</div>
        <div class="stat-card"><span class="stat-number" id="slangCount">0</span> ⚡ жаргон</div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="normal">📘 Обычные термины</button>
        <button class="tab-btn" data-tab="slang">⚡ Жаргон / Сленг</button>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 Поиск по терминам...">
    </div>

    <div class="dictionary-grid" id="dictionaryGrid"></div>
    <footer>Словарь по специальности «Компьютерные системы и комплексы»</footer>
</div>

<script>
    // ======= ДАННЫЕ =======
    const normalTerms = [
        { term: "Процессор (ЦПУ)", desc: "Центральное устройство, выполняющее вычисления и управляющее системой." },
        { term: "Материнская плата", desc: "Главная плата, объединяющая все компоненты ПК." },
        { term: "Оперативная память (ОЗУ)", desc: "Энергозависимая память для временного хранения данных." },
        { term: "Жесткий диск (HDD)", desc: "Накопитель на магнитных пластинах." },
        { term: "SSD", desc: "Твердотельный накопитель на флеш-памяти." },
        { term: "Видеокарта (GPU)", desc: "Устройство для обработки графики и ИИ-вычислений." },
        { term: "Блок питания", desc: "Преобразует сетевое напряжение для компонентов." },
        { term: "Шина данных", desc: "Линии для передачи данных между компонентами." },
        { term: "Шина адреса", desc: "Передаёт адреса памяти и устройств." },
        { term: "Контроллер прерываний", desc: "Управляет приоритетами прерываний." },
        { term: "Чипсет", desc: "Набор микросхем, связывающий CPU с периферией." },
        { term: "Кэш-память", desc: "Сверхбыстрая память для частых данных." },
        { term: "RAID-массив", desc: "Объединение дисков для отказоустойчивости." },
        { term: "BIOS/UEFI", desc: "Прошивка для инициализации оборудования." },
        { term: "Операционная система", desc: "Управляет ресурсами и интерфейсом." },
        { term: "Драйвер", desc: "Обеспечивает взаимодействие ОС с оборудованием." },
        { term: "Виртуализация", desc: "Создание виртуальных машин на одном сервере." },
        { term: "Гипервизор", desc: "Платформа для управления ВМ (VMware, KVM)." },
        { term: "Контейнеризация", desc: "Изоляция приложений (Docker)." },
        { term: "Кластер", desc: "Группа компьютеров для отказоустойчивости." },
        { term: "Сетевой интерфейс (NIC)", desc: "Адаптер для подключения к сети." },
        { term: "Маршрутизатор", desc: "Направляет пакеты между сетями." },
        { term: "Коммутатор (Switch)", desc: "Соединяет устройства внутри сети." },
        { term: "Межсетевой экран", desc: "Фильтрует трафик, блокирует угрозы." },
        { term: "TCP/IP", desc: "Стек протоколов — основа интернета." },
        { term: "DNS", desc: "Преобразует домены в IP-адреса." },
        { term: "DHCP", desc: "Автоматическая выдача IP-адресов." },
        { term: "Серверная стойка (Rack)", desc: "Каркас для монтажа оборудования." },
        { term: "Облачные вычисления", desc: "Ресурсы по требованию через интернет." },
        { term: "x86-64", desc: "Архитектура инструкций для ПК и серверов." },
        { term: "ARM", desc: "Энергоэффективная RISC-архитектура." },
        { term: "Параллельные вычисления", desc: "Одновременное выполнение задач." },
        { term: "Конвейер команд", desc: "Обработка инструкций по этапам." },
        { term: "Кэш-когерентность", desc: "Согласованность данных в многоядерных CPU." },
        { term: "NUMA", desc: "Неоднородный доступ к памяти." },
        { term: "PCI Express (PCIe)", desc: "Шина для видеокарт и NVMe." },
        { term: "NVMe", desc: "Протокол доступа к SSD через PCIe." },
        { term: "SATA", desc: "Интерфейс для подключения накопителей." },
        { term: "USB", desc: "Стандарт для периферийных устройств." },
        { term: "Thunderbolt", desc: "Интерфейс от Intel (PCIe+DisplayPort)." },
        { term: "ECC-память", desc: "Память с коррекцией ошибок." },
        { term: "SSHD", desc: "Гибрид HDD + SSD-кэш." },
        { term: "SMART", desc: "Самодиагностика дисков." },
        { term: "Система охлаждения", desc: "Активная (вентиляторы) или пассивная." },
        { term: "Форм-фактор", desc: "ATX, Mini-ITX и др. стандарты." },
        { term: "Active Directory", desc: "Служба каталогов для управления." },
        { term: "LDAP", desc: "Протокол доступа к каталогам." },
        { term: "DMI", desc: "Связь CPU и чипсета в Intel." },
        { term: "SAN", desc: "Сеть хранения данных (Fibre Channel)." },
        { term: "NAS", desc: "Сетевое хранилище с файловым доступом." },
        { term: "Резервное копирование", desc: "Создание копий данных." },
        { term: "Бэкап-стратегия 3-2-1", desc: "3 копии, 2 носителя, 1 офлайн." },
        { term: "Redundant PSU", desc: "Два блока питания для отказоустойчивости." },
        { term: "Трассировка платы", desc: "Разводка дорожек на печатной плате." },
        { term: "Мультипроцессорность", desc: "Два и более CPU на одной плате." },
        { term: "Многопоточность", desc: "Одновременное выполнение потоков (SMT)." }
    ];

    const slangTerms = [
        { term: "Глаз", desc: "Вентилятор (кулер)." },
        { term: "Материнка", desc: "Материнская плата." },
        { term: "Проц", desc: "Процессор." },
        { term: "Оперативка", desc: "Оперативная память." },
        { term: "Хард", desc: "Жёсткий диск (HDD)." },
        { term: "Ссдшка", desc: "SSD-накопитель." },
        { term: "Видюха", desc: "Видеокарта." },
        { term: "БПшка", desc: "Блок питания." },
        { term: "Мать", desc: "Материнская плата." },
        { term: "Сокет", desc: "Разъём для процессора." },
        { term: "Камень", desc: "Процессор (мощный)." },
        { term: "Сервак", desc: "Сервер." },
        { term: "Свитч", desc: "Сетевой коммутатор." },
        { term: "Роутер", desc: "Маршрутизатор." },
        { term: "Винда", desc: "Windows." },
        { term: "Линуксоид", desc: "Пользователь Linux." },
        { term: "Дрова", desc: "Драйверы." },
        { term: "Биос", desc: "BIOS/UEFI." },
        { term: "Кэш", desc: "Кэш-память." },
        { term: "Ребаут", desc: "Перезагрузка системы." },
        { term: "Шина", desc: "Шина данных/адреса." },
        { term: "Гигабайтник", desc: "Устройство на 1 ГБ (шутл)." },
        { term: "Термопаста", desc: "Паста для отвода тепла." },
        { term: "Кулер", desc: "Система охлаждения." },
        { term: "Разгон", desc: "Оверклокинг — увеличение частоты." },
        { term: "Троттлинг", desc: "Снижение частоты при перегреве." },
        { term: "BSOD", desc: "Синий экран смерти Windows." },
        { term: "Глюк", desc: "Сбой в ПО или железе." },
        { term: "Лаги", desc: "Задержки, тормоза." },
        { term: "Флешка", desc: "USB-накопитель." },
        { term: "Клава", desc: "Клавиатура." },
        { term: "Мышка", desc: "Компьютерная мышь." },
        { term: "Серверняк", desc: "Серверная комната/стойка." },
        { term: "Бэкап", desc: "Резервная копия." },
        { term: "Апгрейд", desc: "Модернизация комплектующих." },
        { term: "Железо", desc: "Аппаратные компоненты." },
        { term: "Софт", desc: "Программное обеспечение." },
        { term: "Башня", desc: "Tower-корпус." },
        { term: "Резак", desc: "Блок питания (неформ.)." },
        { term: "Моноблок", desc: "Компьютер «всё в одном»." }
    ];

    // Объединяем: 56 обычных + 40 жаргонных = 96
    const allTerms = [...normalTerms, ...slangTerms];
    const totalCount = allTerms.length;

    // DOM
    const grid = document.getElementById('dictionaryGrid');
    const searchInput = document.getElementById('searchInput');
    document.getElementById('totalCount').textContent = totalCount;
    document.getElementById('normalCount').textContent = normalTerms.length;
    document.getElementById('slangCount').textContent = slangTerms.length;

    let activeTab = 'normal';
    let searchQuery = '';

    function render() {
        const filtered = allTerms.filter(item => {
            const isNormal = normalTerms.includes(item);
            if (activeTab === 'normal' && !isNormal) return false;
            if (activeTab === 'slang' && isNormal) return false;
            if (searchQuery.trim()) {
                const q = searchQuery.toLowerCase();
                return item.term.toLowerCase().includes(q) || item.desc.toLowerCase().includes(q);
            }
            return true;
        });

        if (!filtered.length) {
            grid.innerHTML = `<div class="no-results">🔎 Ничего не найдено по запросу «${searchQuery}»</div>`;
            return;
        }

        grid.innerHTML = filtered.map(item => {
            const isSlang = slangTerms.includes(item);
            const tag = isSlang ? '<span class="slang-tag">сленг</span>' : '';
            return `
                <div class="term-card">
                    <div class="term-title">${item.term} ${tag}</div>
                    <div class="term-desc">${item.desc}</div>
                </div>
            `;
        }).join('');
    }

    // Вкладки
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeTab = btn.dataset.tab;
            render();
        });
    });

    // Поиск
    searchInput.addEventListener('input', () => {
        searchQuery = searchInput.value;
        render();
    });

    render();
</script>
</body>
</html>
